services:
  app:
    build: .
    container_name: taskapp
    restart: always
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      # Persist tasks.json outside the container
      - ./tasks.json:/app/tasks.json
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
