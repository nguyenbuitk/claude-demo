services:
  app:
    build: .
    container_name: taskapp
    restart: always
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      # Persist tasks.json outside the container
      - ./tasks.json:/app/tasks.json
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
